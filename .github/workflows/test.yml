name: Test

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ["self-hosted", "run-${{github.run_id}}"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Install NCRL Library Locally 
        run: |
          pip install -e .

      - name: Run tests
        run: python -m unittest discover -s tests -p "*test*.py" -v
